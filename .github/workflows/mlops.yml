name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        run: |
          echo "AZURE_STORAGE_CONNECTION_STRING=${{ secrets.CLOUD_CREDENTIALS }}" >> $GITHUB_ENV

      - name: Pull data with DVC
        run: dvc pull

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          python -c '
          import json
          with open("outputs/metrics.json") as f:
              metrics = json.load(f)
              print(f"accuracy={metrics[\"accuracy\"]}")
          ' >> $GITHUB_OUTPUT

      - name: Upload model to Cloud Storage
        run: |
          python - <<'EOF'
          import os
          from azure.storage.blob import BlobServiceClient
          
          connection_string = os.environ["AZURE_STORAGE_CONNECTION_STRING"]
          bucket_name = "${{ secrets.CLOUD_BUCKET }}"
          model_path = "models/model.pkl"
          target_blob_name = "models/latest/model.pkl"
          
          blob_service_client = BlobServiceClient.from_connection_string(connection_string)
          blob_client = blob_service_client.get_blob_client(container=bucket_name, blob=target_blob_name)
          
          with open(model_path, "rb") as data:
              blob_client.upload_blob(data, overwrite=True)
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python - <<'EOF'
          accuracy = float("${{ needs.train.outputs.accuracy }}")
          if accuracy < 0.70:
              print(f"Accuracy {accuracy} is below threshold 0.70")
              exit(1)
          else:
              print(f"Accuracy {accuracy} meets the threshold")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl -f http://localhost:8000/health || exit 1
